<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessible Photo Gallery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Interactive Photo Gallery</h1>
    <div class="gallery">
        <figure>
            <img src="mountain.jpg" alt="A beautiful mountain landscape">
            <figcaption>Mountain View</figcaption>
        </figure>
        <figure>
            <img src="location2.jpg" alt="A calm lake at sunset">
            <figcaption>Sunset Lake</figcaption>
        </figure>
        <figure>
            <img src="mountain1.jpg" alt="A dense forest with sunlight filtering through">
            <figcaption>Sunlit Forest</figcaption>
        </figure>
        <figure>
            <img src="sunset2.jpg" alt="A city skyline at night">
            <figcaption>City Lights</figcaption>
        </figure>
        <figure>
            <img src="sunset_biew.jpg" alt="A beach with golden sand">
            <figcaption>Golden Beach</figcaption>
        </figure>
        <figure>
            <img src="construction.jpg" alt="A snowy mountain peak">
            <figcaption>Snowy Peak</figcaption>
        </figure>
    </div>
    <script src="script.js"></script>
</body>
</html>
